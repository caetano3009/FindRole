<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FindRolês — encontre seu próximo lugar</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;0,800;1,800&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page">
    <header class="header">
      <div class="header-left">
        <h1 class="logo"><span class="logo-find">Find</span><span class="logo-roles">Rolês</span></h1>
        <p class="subtitle"><span id="count-total">0</span> lugares salvos · São Paulo &amp; mais</p>
      </div>
      <div class="header-right">
        <input id="search" type="text" placeholder="buscar lugar, bairro ou tipo…" autocomplete="off" />
      </div>
    </header>

    <nav class="filters" id="filters"></nav>

    <section class="table-wrap">
      <div class="table-head">
        <span class="col-num"></span>
        <span class="col-name">LUGAR</span>
        <span class="col-bairro">BAIRRO</span>
        <span class="col-tipo">TIPO</span>
        <span class="col-preco">PREÇO</span>
      </div>
      <ul class="list" id="list"></ul>
      <div id="empty" class="empty" hidden>Nada encontrado por aqui. Tenta outro filtro.</div>
    </section>

    <footer class="footer">
      <span>findrolês · feito pra quem coleciona lugares</span>
    </footer>
  </div>

  <!-- Modal -->
  <div class="modal" id="modal" hidden>
    <div class="modal-backdrop" data-close></div>
    <article class="modal-card" role="dialog" aria-modal="true">
      <button class="modal-close" data-close aria-label="Fechar">×</button>
      <div class="modal-grid">
        <div class="modal-media">
          <img id="m-img" alt="" />
          <div class="modal-tags">
            <span id="m-tipo" class="tag"></span>
            <span id="m-preco" class="price"></span>
          </div>
        </div>
        <div class="modal-body">
          <p class="modal-eyebrow" id="m-bairro"></p>
          <h2 class="modal-title" id="m-nome"></h2>
          <p class="modal-desc" id="m-desc"></p>
          <div class="modal-meta">
            <a id="m-maps" class="btn btn-primary" target="_blank" rel="noopener">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 1 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
              Ver no mapa
            </a>
            <span id="m-special" class="badge" hidden></span>
          </div>
          <div class="modal-video">
            <h3 class="vid-title">um pouco do lugar</h3>
            <div class="tiktok-frame" id="m-video"></div>
          </div>
        </div>
      </div>
    </article>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
